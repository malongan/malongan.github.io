# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

## Site
title: malongan
subtitle: 技术博客，记录成长与分享
description: 个人技术博客，记录成长与分享
keywords: 博客,技术,前端,后端,分享
author: malongan
language: zh-CN
timezone: Asia/Shanghai

## URL
## If your site is put in a subdirectory, set url as 'https://username.github.io/blog' and root as '/blog/'
url: https://malongan.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

## Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: []

## Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

## Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

## Category & Tag
default_category: uncategorized
category_map:
tag_map:

## Metadata elements
meta_generator: true

## Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

## Pagination
per_page: 10
pagination_dir: page

## Extensions
## Plugins: https://hexo.io/plugins/
theme: butterfly

## Deployment
## Docs: https://hexo.io/docs/one-command-deployment.html
deploy:
  type: git
  repo: https://github.com/malongan/malongan.github.io.git
  branch: gh-pages
  message: 'Site updated: {{ now("YYYY-MM-DD HH:mm:ss") }}'
  # token: ${GITHUB_TOKEN}  # 通过环境变量注入，不要硬编码

## Markdown
## Docs: https://hexo.io/docs/markdown.html
markdown:
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
    quotes: '“”‘’'
  plugins:
    - hexo-filter-nofollow
    - hexo-filter-nofollow-external

## Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

## Sitemap
sitemap:
  path: sitemap.xml
  template: 
  rel: false
  tags: true
  categories: true

## Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

## JSON Content API
jsonContent:
  meta: true
  dateFormat: "YYYY-MM-DD HH:mm:ss"
  pages:
    title: true
    date: true
    updated: true
    comments: true
    path: true
    permalink: true
    excerpt: true
    content: true
  posts:
    title: true
    date: true
    updated: true
    comments: true
    path: true
    permalink: true
    excerpt: true
    content: true
    author: true
    categories: true
    tags: true
  categories:
    name: true
    slug: true
    path: true
  tags:
    name: true
    slug: true
    path: true