# Hexo Butterfly Theme Configuration
## Docs: https://butterfly.js.org/posts/21cfbf15/

# =====================
# 基础配置
# =====================

# 网站 favicon
favicon: /favicon.ico

# 网站 avatar
avatar: /img/avatar.png

# 网站标题分隔符
index_site_name: true

# 站点创建时间
since: 2024

# 网站图标 (用于 SEO)
# 用于 Open Graph / Twitter Card
og_image: /img/og-image.png

# 站点副标题（打字机效果）
subtitle:
  enable: true
  # Typewriter Effect
  effect: true
  # loop
  loop: true
  # source: 1=hitokoto.cn, 2=自定义
  source: 1
  # 自定义副标题内容 (source=2 时生效)
  custom:
    - 代码改变世界
    - 记录成就更好的自己
    - 保持热爱，奔赴山海

# 网站公告
notice:
  enable: true
  content: 欢迎来到我的技术博客！🚀

# =====================
# 菜单配置
# =====================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user
  友链: /friends/ || fas fa-link

# =====================
# 代码块配置
# =====================
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# =====================
# 文章相关
# =====================

# 文章版权
post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/malongan
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 文章编辑链接
post_edit:
  enable: true
  url: https://github.com/malongan/malongan.github.io/edit/main/source/${path}

# 文章置顶
sticky: 100

# 文章加密
encrypt:
  # 使用 hexo-blog-encrypt 插件
  # enable: true
  # abstract: 有东西被加密了，请输入密码查看
  # message: 请输入密码
  # tags:
  # - {name: tagName, password: passwd}
  # wrong_pass_message: 密码错误，请重试
  # wrong_hash_message: 无法验证密码，请联系作者

# 数学公式
math:
  enable: true
  engine: katex
  copy_tex: true
  mhchem: true

# 文章目录
toc:
  enable: true
  number: true
  wrap: true
  expand_all: false
  max_depth: 3

# =====================
# 侧边栏
# =====================
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 保持热爱，奔赴山海 🚀
    button:
      enable: true
      text: 关注我
      link: https://github.com/malongan
  card_announcement:
    enable: true
    content: 欢迎来到我的技术博客！
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 10
    expand: none
  card_tags:
    enable: true
    limit: 20
    color: true
    orderby: random
  card_archives:
    enable: true
    limit: 10
    type: monthly
    format: MMMM YYYY
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    site_word_count: true
    site_uv: false
    site_pv: false

# =====================
# 底部
# =====================
footer:
  owner:
    enable: true
    since: 2024
    nickname: 你的昵称
  copyright:
    enable: true
    license: CC BY-NC-SA 4.0
    license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/
  powered:
    enable: true
    version: true
  theme:
    enable: true
    version: true
  custom_text: Hosted on GitHub Pages
  beian:
    enable: false
    icp:
    gongan:
  busy: false
  runtime:
    enable: true
    format: 网站已运行 {days} 天 {hours} 小时 {minutes} 分钟 {seconds} 秒

# =====================
# 社交链接
# =====================
social:
  GitHub: https://github.com/malongan || fab fa-github
  Email: mailto:你的邮箱@example.com || fas fa-envelope
  Twitter: https://twitter.com/你的用户名 || fab fa-twitter
  RSS: /atom.xml || fas fa-rss

# =====================
# 页面加载动画
# =====================
preloader:
  enable: true
  source: 1
  # 自定义加载动画 (source=5 时生效)
  # custom: /css/preloader.css

# =====================
# 页面顶部加载进度条
# =====================
pace:
  enable: true
  theme: minimal

# =====================
# 字体配置
# =====================
font:
  global:
    external: true
    family: "Noto Sans SC"
    size: 16px
  headings:
    external: true
    family: "Noto Sans SC"
  posts:
    external: true
    family: "Noto Sans SC"
  logo:
    external: true
    family: "Noto Sans SC"
    size: 1.8rem
  code:
    external: true
    family: "JetBrains Mono"

# CDN 配置
cdnjscssdeliver: https://cdn.jsdelivr.net/npm

# =====================
# 插件配置
# =====================

# 搜索
search:
  enable: true
  service: hexo-generator-search
  # 可选: algolia, local, hexo-generator-search
  # algolia:
  #   app_id: 
  #   api_key: 
  #   index_name: 
  #   hits_per_page: 10

# 相册
gallery:
  enable: true
  # fancybox: true

# 代码复制
copy:
  enable: true
  copyright:
    enable: true
    limit_count: 50

# 书签
bookmark:
  enable: true
  save: auto

# 阅读模式
reading_mode: true

# 页面滚动百分比
scroll_percent: true

# 字数统计
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created
  # 标签权重
  tags_weight: 100
  # 分类权重
  categories_weight: 80

# 文章加密提示
# encrypt:
#   enable: true
#   abstract: 有东西被加密了，请输入密码查看
#   message: 请输入密码

# =====================
# 第三方服务
# =====================

# 访问统计
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# 评论系统
# 可选: waline, giscus, twikoo, valine, disqus
comment:
  enable: true
  type: giscus
  # giscus 配置 (需在 GitHub 创建 Discussion 仓库)
  giscus:
    repo: malongan/malongan.github.io
    repo_id: 你的repo_id
    category: Announcements
    category_id: 你的category_id
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    theme: light
    lang: zh-CN
    crossorigin: anonymous

# 打赏
reward:
  enable: true
  comment: 赏个橘子吃 🍊
  wechatpay: /img/reward/wechatpay.png
  alipay: /img/reward/alipay.png
  bitcoin: /img/reward/bitcoin.png

# 分享
share:
  enable: true
  sites: facebook,twitter,linkedin,weibo,qq,qzone,telegram,reddit

# 图片懒加载
lazyload:
  enable: true
  onlypost: false
  loading_img: /img/loading.gif

# PWA
pwa:
  enable: true
  manifest: /manifest.json
  theme_color: "#fff"
  apple_touch_icon: /img/apple-touch-icon.png
  favicon_32_32: /img/favicon-32x32.png
  favicon_16_16: /img/favicon-16x16.png
  mask_icon: /img/safari-pinned-tab.svg

# SEO
seo:
  enable: true
  baidu_push: false
  google_analytics: G-XXXXXXXXXX
  google_site_verification:
  bing_site_verification:
  baidu_site_verification:

# 站点地图提交
# baidu_url_submit:
#   enable: true
#   token: 你的百度推送token

# RSS
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20

# 友链
friends:
  enable: true
  limit: 10
  # 数据文件路径: source/_data/friends.yml

# 文章置顶样式
sticky:
  enable: true
  icon: fas fa-thumbtack
  color: "#ff7242"

# 404 页面
error_404:
  enable: true
  subtitle: 页面走丢了 😭
  background: /img/404.jpg

# 页面过渡动画
pjax:
  enable: true
  exclude:
    - /search/
    - /archives/

# 代码块复制按钮
code_copy:
  enable: true
  style: default
  # 可选: default, mac

# 标签云
tagcloud:
  enable: true
  min_font: 12
  max_font: 24
  color: true
  start_color: "#999"
  end_color: "#555"

# 页面加载性能
inject:
  head:
    - <link rel="preconnect" href="https://cdn.jsdelivr.net">
    - <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/instant.page@5.1.0/instantpage.min.js" type="module"></script>

# 导航栏
navbar:
  enable: true
  sticky: true
  hide_on_scroll: false
  menu:
    enable: true
    # 隐藏菜单项: 当宽度小于 768px 时隐藏
    hide: false
  logo:
    enable: true
    image: /img/logo.png
    text: 你的博客名称

# 页面顶部图片
top_img:
  enable: true
  source: /img/banner.jpg
  # 也可以使用随机图片 API
  # source: https://api.xxx.com/random

# 封面图
cover:
  enable: true
  # 默认封面图
  default_cover: /img/default_cover.jpg

# 文章页顶部图片
post_top_img:
  enable: true
  source: /img/post_banner.jpg

# 侧边栏个人信息
author:
  enable: true
  name: 你的昵称
  avatar: /img/avatar.png
  link: https://github.com/malongan
  description: 保持热爱，奔赴山海 🚀

# 代码块折叠
code_block:
  copy_button: true
  fold: true
  fold_height: 300

# 文章目录自动展开
toc:
  auto_expand: true

# 夜间模式
darkmode:
  enable: true
  button: true
  # auto: 根据系统主题自动切换
  # manual: 手动切换
  mode: auto

# 页面阴影
shadow:
  enable: true
  # 可选: light, dark
  theme: light

# 页面过渡动画
page_transition:
  enable: true
  type: fade

# 鼠标点击特效
fireworks:
  enable: false

# 彩带特效
ribbon:
  enable: false

# 页面点击爱心
click_heart:
  enable: true

# 页面加载进度条
loading:
  enable: true

# =====================
# 备用 CDN 配置
# =====================
# 如果 jsdelivr 被墙，可替换为其他 CDN
# cdn:
#   css: https://cdn.jsdelivr.net/npm
#   js: https://cdn.jsdelivr.net/npm
#   images: https://cdn.jsdelivr.net/gh

# =====================
# 开发者模式
# =====================
developer:
  enable: false
  # 可选: true/false
  # 开启后会在控制台输出调试信息